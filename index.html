<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamTools - Documentation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
            <style>
        :root {
            --bg: #0b0d10;
            --panel: #121418;
            --panel-2: #171a20;
            --border: #242932;
            --text: #e6e8eb;
            --text-soft: #b7bcc4;
            --muted: #8a919d;
            --accent: #7f8ea3;
            --accent-soft: rgba(127, 142, 163, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #14171c 0%, #101318 100%);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 24px 0;
            transition: transform 0.25s ease;
        }

        .sidebar-header {
            padding: 0 20px 18px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .sidebar h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 14px;
            letter-spacing: -0.3px;
        }

        .search-box { position: relative; }

        .search-box input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .search-box input::placeholder { color: var(--muted); }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
            pointer-events: none;
        }

        .sidebar::-webkit-scrollbar { width: 8px; }
        .sidebar::-webkit-scrollbar-track { background: #121821; }
        .sidebar::-webkit-scrollbar-thumb { background: #2a3446; border-radius: 6px; }

        .category { margin: 16px 0; }

        .category-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            padding: 10px 20px 8px;
            letter-spacing: 0.9px;
        }

        .sidebar ul { list-style: none; }

        .sidebar a {
            color: var(--text-soft);
            text-decoration: none;
            display: block;
            margin: 2px 10px;
            padding: 9px 12px;
            font-size: 14px;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }

        .sidebar a:hover {
            background: rgba(127, 142, 163, 0.14);
            color: var(--text);
        }

        .sidebar a.active {
            background: var(--accent-soft);
            color: #d0d6de;
            box-shadow: inset 0 0 0 1px rgba(127, 142, 163, 0.32);
        }

        .sidebar a.hidden { display: none; }

        .menu-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background: var(--panel-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }

        .menu-toggle:active { transform: scale(0.97); }

        .content {
            flex: 1;
            overflow-y: auto;
            background: #0d1014;
        }

        .content-inner {
            max-width: 1180px;
            margin: 18px auto;
            padding: 48px 44px;
            background: #12161d;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .content::-webkit-scrollbar { width: 10px; }
        .content::-webkit-scrollbar-track { background: #0d1014; }
        .content::-webkit-scrollbar-thumb { background: #2a3446; border-radius: 6px; }

        .content h1 {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #f0f2f5;
            letter-spacing: -1.1px;
            line-height: 1.1;
        }

        .content h1 + p {
            font-size: 17px;
            color: var(--muted);
            margin-bottom: 28px;
        }

        .content h2 {
            font-size: 30px;
            font-weight: 600;
            margin-top: 48px;
            margin-bottom: 16px;
            color: #e5e8ed;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .content h3 {
            font-size: 22px;
            font-weight: 600;
            margin-top: 34px;
            margin-bottom: 12px;
            color: #d8dce3;
        }

        .content h4 {
            font-size: 18px;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 10px;
            color: #cdd2da;
        }

        .content p {
            line-height: 1.75;
            margin-bottom: 18px;
            font-size: 16px;
            color: var(--text-soft);
        }

        .content strong { color: var(--text); }
        .content em { color: #c7ccd4; }

        .content code {
            background: #1d222b;
            color: #bcc4cf;
            padding: 2px 7px;
            border-radius: 6px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            border: 1px solid #2d3440;
        }

        .content pre {
            background: #0f131a;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 24px 0;
            border: 1px solid #262d39;
        }

        .content pre code {
            background: none;
            padding: 0;
            border: none;
            color: #d9dde4;
            font-size: 14px;
            line-height: 1.6;
        }

        .content ul, .content ol {
            margin-left: 24px;
            margin-bottom: 20px;
            color: var(--text-soft);
        }

        .content ul { list-style: none; }

        .content ul li {
            position: relative;
            padding-left: 22px;
            margin-bottom: 10px;
            line-height: 1.75;
        }

        .content ul li::before {
            content: "-";
            position: absolute;
            left: 4px;
            color: var(--accent);
            font-weight: 700;
        }

        .content ol li {
            margin-bottom: 10px;
            line-height: 1.75;
            padding-left: 6px;
        }

        .content blockquote {
            border-left: 4px solid var(--accent);
            margin: 22px 0;
            color: #c1d0e6;
            background: rgba(127, 142, 163, 0.14);
            padding: 16px 18px;
            border-radius: 0 8px 8px 0;
        }

        .content blockquote p { margin: 0; color: #c1d0e6; }

        .content hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 34px 0;
        }

        .content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 22px 0;
            border: 1px solid #2b313b;
        }

        .content table {
            border-collapse: collapse;
            width: 100%;
            margin: 24px 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .content th, .content td {
            border: 1px solid var(--border);
            padding: 12px 14px;
            text-align: left;
            font-size: 14px;
        }

        .content th {
            background: #1a1f27;
            color: #eceff3;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.4px;
        }

        .content td {
            background: #12161d;
            color: var(--text-soft);
        }

        .content tr:hover td { background: #171c24; }

        .content a {
            color: #7fb0ff;
            text-decoration: none;
            transition: color 0.2s;
        }

        .content a:hover {
            color: #a9cbff;
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 56px;
            color: var(--muted);
        }

        .empty-state {
            text-align: center;
            padding: 70px 20px;
            color: var(--muted);
        }

        .empty-state h1 { color: var(--text); }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 999;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }

            .menu-toggle { display: block; }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 1001;
                transform: translateX(-100%);
                width: 85%;
                max-width: 320px;
                padding-top: 72px;
            }

            .sidebar.open { transform: translateX(0); }
            .overlay.visible { display: block; }

            .content { width: 100%; }

            .content-inner {
                margin: 70px 12px 14px;
                padding: 32px 20px;
            }

            .content h1 { font-size: 32px; }
            .content h2 { font-size: 26px; margin-top: 38px; }
            .content h3 { font-size: 20px; margin-top: 30px; }
            .content h4 { font-size: 16px; margin-top: 22px; }
            .content p { font-size: 15px; }
            .content pre { padding: 15px; font-size: 13px; }
        }

        @media (max-width: 480px) {
            .sidebar { width: 90%; }
            .menu-toggle { top: 14px; left: 14px; padding: 9px 12px; }
            .content-inner { margin-top: 64px; padding: 26px 14px; }
            .content h1 { font-size: 28px; }
            .content h2 { font-size: 23px; }
            .content h3 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>SteamTools - Docs</h1>
            <div class="search-box">
                <span class="search-icon">⌕</span>
                <input type="text" id="search" placeholder="Search..." oninput="searchDocs(this.value)">
            </div>
        </div>
        <div id="menu"></div>
    </div>
    <div class="content" id="content">
        <div class="content-inner">
            <div class="loading">Loading documentation...</div>
        </div>
    </div>

    <script>
        const menu = document.getElementById('menu');
        const content = document.getElementById('content');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.querySelector('.overlay');
        let allMenuItems = [];
        let availableFiles = [];
        let routeToFile = new Map();

        function toggleMenu() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('visible');
        }

        function closeMenu() {
            sidebar.classList.remove('open');
            overlay.classList.remove('visible');
        }

        function searchDocs(query) {
            query = query.toLowerCase().trim();
            
            if (!query) {
                allMenuItems.forEach(item => {
                    item.link.classList.remove('hidden');
                });
                document.querySelectorAll('.category').forEach(cat => {
                    cat.style.display = 'block';
                });
                return;
            }

            allMenuItems.forEach(item => {
                const title = item.title.toLowerCase();
                if (title.includes(query)) {
                    item.link.classList.remove('hidden');
                } else {
                    item.link.classList.add('hidden');
                }
            });

            document.querySelectorAll('.category').forEach(cat => {
                const visibleLinks = cat.querySelectorAll('a:not(.hidden)');
                cat.style.display = visibleLinks.length > 0 ? 'block' : 'none';
            });
        }

        function makeTitle(filename) {
            return filename
                .replace('.md', '')
                .replace(/_/g, ' ')
                .split('/')
                .pop()
                .split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
        }

        function getFolderName(path) {
            const normalized = path.replace(/\\/g, '/');
            const parts = normalized.split('/');
            
            if (parts.length > 1) {
                return parts[parts.length - 2];
            }
            return null;
        }

        function organizeFiles(files) {
            const structure = { root: [], folders: {} };
            
            files.forEach(file => {
                const folder = getFolderName(file);
                
                if (folder) {
                    if (!structure.folders[folder]) {
                        structure.folders[folder] = [];
                    }
                    structure.folders[folder].push(file);
                } else {
                    structure.root.push(file);
                }
            });
            
            return structure;
        }

        function toRoutePart(name) {
            const raw = name
                .replace(/\.md$/i, '')
                .replace(/[_-]+/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();

            return raw
                .split(' ')
                .filter(Boolean)
                .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
                .join('');
        }

        function normalizeFilePath(file) {
            return file.replace(/\\/g, '/').replace(/^\/+/, '');
        }

        function createDocPath(file) {
            const normalized = normalizeFilePath(file);
            const parts = normalized.split('/').map(toRoutePart).filter(Boolean);
            return `/${parts.join('/')}`;
        }

        function buildRouteMap(files) {
            routeToFile = new Map();
            files.forEach(file => {
                routeToFile.set(createDocPath(file).toLowerCase(), file);
            });
        }

        function getFileFromPathname(pathnameOverride = null) {
            const rawPath = pathnameOverride || window.location.pathname;
            const pathname = rawPath.replace(/\/+$/, '') || '/';
            if (pathname === '/' || pathname.toLowerCase() === '/index.html') {
                return null;
            }

            return routeToFile.get(pathname.toLowerCase()) || null;
        }

        function getFileUrl(file) {
            const normalized = normalizeFilePath(file);
            const encoded = normalized
                .split('/')
                .map(segment => encodeURIComponent(segment))
                .join('/');
            return `/${encoded}`;
        }

        function findMenuItem(file) {
            return allMenuItems.find(item => item.file === file) || null;
        }

        function openFileFromPath(pathnameOverride = null) {
            const file = getFileFromPathname(pathnameOverride);
            if (!file || !availableFiles.includes(file)) {
                return false;
            }

            const item = findMenuItem(file);
            if (!item) {
                return false;
            }

            loadDoc(file, item.link, { updatePath: false });
            return true;
        }

        function buildMenu(structure) {
            let html = '';
            allMenuItems = [];

            if (structure.root.length > 0) {
                html += '<div class="category"><ul>';
                structure.root.forEach(file => {
                    const title = makeTitle(file);
                    html += `<li><a href="${createDocPath(file)}" data-file="${file}">${title}</a></li>`;
                });
                html += '</ul></div>';
            }

            Object.keys(structure.folders).sort().forEach(folder => {
                html += `<div class="category">
                    <div class="category-title">${makeTitle(folder)}</div>
                    <ul>`;
                
                structure.folders[folder].forEach(file => {
                    const title = makeTitle(file);
                    html += `<li><a href="${createDocPath(file)}" data-file="${file}">${title}</a></li>`;
                });
                
                html += '</ul></div>';
            });

            menu.innerHTML = html;

            document.querySelectorAll('.sidebar a').forEach(link => {
                allMenuItems.push({
                    link: link,
                    title: link.textContent,
                    file: link.dataset.file
                });
                
                link.onclick = (e) => {
                    e.preventDefault();
                    const nextPath = createDocPath(link.dataset.file);
                    if (window.location.pathname !== nextPath) {
                        history.pushState({ file: link.dataset.file }, '', nextPath);
                        loadDoc(link.dataset.file, link, { updatePath: false });
                    } else {
                        loadDoc(link.dataset.file, link, { updatePath: false });
                    }
                    if (window.innerWidth <= 768) {
                        closeMenu();
                    }
                };
            });
        }

        async function loadDoc(file, link, options = {}) {
            const { updatePath = true } = options;
            const contentInner = document.querySelector('.content-inner');
            contentInner.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const response = await fetch(getFileUrl(file));
                if (!response.ok) {
                    throw new Error('Fichier non trouvÃ©');
                }
                const markdown = await response.text();
                contentInner.innerHTML = marked.parse(markdown);
                
                document.getElementById('content').scrollTop = 0;
                
                document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
                link.classList.add('active');

                if (updatePath) {
                    const nextPath = createDocPath(file);
                    if (window.location.pathname !== nextPath) {
                        history.pushState({ file }, "", nextPath);
                    }
                }
            } catch (error) {
                contentInner.innerHTML = `
                    <h1>File not found</h1>
                    <p>The file <code>${file}</code> does not exist.</p>
                `;
            }
        }

        async function init() {
            const contentInner = document.querySelector('.content-inner');
            
            try {
                const response = await fetch('/index.json');
                if (!response.ok) {
                    throw new Error('index.json not found');
                }
                
                const files = await response.json();
                
                if (files.length === 0) {
                    contentInner.innerHTML = `
                        <div class="empty-state">
                            <h1>No files found</h1>
                            <p>Run the Python script to generate the index.</p>
                        </div>
                    `;
                    return;
                }
                
                availableFiles = files;
                buildRouteMap(files);
                const structure = organizeFiles(files);
                buildMenu(structure);

                window.addEventListener('popstate', openFileFromPath);

                const queryPath = new URLSearchParams(window.location.search).get('p');
                let requestedPath = null;
                if (queryPath) {
                    try {
                        requestedPath = decodeURIComponent(queryPath);
                    } catch (error) {
                        requestedPath = null;
                    }
                }

                const openedFromRequestedPath = requestedPath ? openFileFromPath(requestedPath) : false;
                if (openedFromRequestedPath) {
                    const resolvedFile = getFileFromPathname(requestedPath);
                    if (resolvedFile) {
                        history.replaceState({ file: resolvedFile }, '', createDocPath(resolvedFile));
                    }
                } else if (!openFileFromPath()) {
                    const firstLink = menu.querySelector('a');
                    if (firstLink) {
                        const firstPath = createDocPath(firstLink.dataset.file);
                        history.replaceState({ file: firstLink.dataset.file }, "", firstPath);
                        loadDoc(firstLink.dataset.file, firstLink, { updatePath: false });
                    }
                }
            } catch (error) {
                contentInner.innerHTML = `
                    <div class="empty-state">
                        <h1>index.json file not found</h1>
                        <p>Create the file <code>generate_index.py</code> and run it to generate the index.</p>
                        <pre style="text-align: left; background: #1a1a1a; padding: 20px; border-radius: 8px; margin-top: 24px; border: 1px solid #2a2a2a;">import os
import json

def scan_docs():
    files = []
    for root, dirs, filenames in os.walk('.'):
        for f in filenames:
            if f.endswith('.md'):
                path = os.path.join(root, f).replace('\\\\', '/').replace('./', '')
                files.append(path)
    
    with open('index.json', 'w', encoding='utf-8') as f:
        json.dump(files, f, indent=2)
    
    print(f"{len(files)} fichiers trouvés")

if __name__ == '__main__':
    scan_docs()</pre>
                        <p style="margin-top: 15px;">Then run: <code>python generate_index.py</code></p>
                    </div>
                `;
            }
        }                

        init();
    </script>
</body>
</html>
